{{template "layout" .}}
{{define "content"}}
<section>
    <h2>Meal Plan</h2>
    <div class="mealplan-container">
        <div class="mealplan-grid">
            <table role="grid">
                <thead>
                    <tr>
                        <th></th>
                        <th>Breakfast</th>
                        <th>Lunch</th>
                        <th>Dinner</th>
                    </tr>
                </thead>
                <tbody id="mealplan-body">
                    {{range $day := (slice "Monday" "Tuesday" "Wednesday" "Thursday" "Friday" "Saturday" "Sunday")}}
                    <tr>
                        <td><strong>{{$day}}</strong></td>
                        <td class="meal-slot" data-day="{{$day}}" data-meal="breakfast">
                            <span class="slot-recipe"></span>
                            <button class="slot-clear" onclick="clearSlot('{{$day}}', 'breakfast')" style="display:none">x</button>
                        </td>
                        <td class="meal-slot" data-day="{{$day}}" data-meal="lunch">
                            <span class="slot-recipe"></span>
                            <button class="slot-clear" onclick="clearSlot('{{$day}}', 'lunch')" style="display:none">x</button>
                        </td>
                        <td class="meal-slot" data-day="{{$day}}" data-meal="dinner">
                            <span class="slot-recipe"></span>
                            <button class="slot-clear" onclick="clearSlot('{{$day}}', 'dinner')" style="display:none">x</button>
                        </td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
        <div class="mealplan-actions">
            <button onclick="generateShoppingList()">Generate Shopping List</button>
            <button class="secondary" onclick="clearMealPlan()">Clear All</button>
        </div>
        <div class="mealplan-sidebar">
            <h3>Add Recipe</h3>
            <input type="search" id="mealplan-search" placeholder="Search recipes..." oninput="filterMealPlanRecipes(this.value)">
            <select id="mealplan-day">
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
                <option value="Sunday">Sunday</option>
            </select>
            <select id="mealplan-meal">
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
            </select>
            <div id="mealplan-recipe-list">
                {{range .Recipes}}
                <div class="mealplan-recipe-item" data-slug="{{.Slug}}" data-title="{{.Title}}" onclick="addToMealPlan('{{.Slug}}', '{{.Title}}')">
                    {{.Title}} <small>({{.Category}})</small>
                </div>
                {{end}}
            </div>
        </div>
    </div>
</section>
{{end}}
